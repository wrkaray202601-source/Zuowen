<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>句子扩写练习 · AI批改</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background: linear-gradient(160deg, #FFFBEB 0%, #FFF7ED 50%, #ECFDF5 100%);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .header {
    background: linear-gradient(135deg, #1C1917, #292524);
    padding: 20px 24px 18px;
    text-align: center;
  }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 4px; }
  .header-title { font-size: 22px; font-weight: 900; color: #FCD34D; }
  .header-desc { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }

  .progress-wrap { padding: 0 24px; }
  .progress-dots { display: flex; gap: 8px; justify-content: center; margin: 16px 0 4px; }
  .dot { height: 10px; border-radius: 5px; transition: all 0.4s ease; background: #E5E7EB; width: 10px; }
  .dot.done { background: #F59E0B; width: 24px; }
  .dot.active { background: #FBBF24; box-shadow: 0 0 0 3px #FDE68A; }
  .progress-label { text-align: center; font-size: 12px; color: #9CA3AF; margin-bottom: 16px; }

  .main { max-width: 560px; margin: 0 auto; padding: 0 16px; }

  .card {
    background: white; border-radius: 20px; padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid #F3F4F6;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slide { 0%{margin-left:-60%} 100%{margin-left:110%} }
  @keyframes pop {
    0%{transform:scale(0);opacity:1}
    60%{transform:scale(1.3) translateY(-40px);opacity:1}
    100%{transform:scale(1) translateY(-80px);opacity:0}
  }

  .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .topic-btn {
    cursor: pointer; border: 2px solid #E5E7EB; border-radius: 14px;
    padding: 12px 16px; background: white; font-size: 15px;
    transition: all 0.2s; text-align: center;
    font-family: inherit; color: #1C1917;
  }
  .topic-btn:hover { border-color: #F59E0B; background: #FFFBEB; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.2); }
  .topic-full { grid-column: 1 / -1; }

  textarea {
    width: 100%; border: 2px solid #E5E7EB; border-radius: 12px;
    padding: 14px 16px; font-size: 16px; font-family: inherit;
    resize: none; outline: none; line-height: 1.7;
    transition: border-color 0.2s; background: white;
  }
  textarea:focus { border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }

  .btn-main {
    background: linear-gradient(135deg, #F59E0B, #EF8C00);
    color: white; border: none; border-radius: 50px;
    padding: 14px 36px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(245,158,11,0.4);
    transition: all 0.2s;
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.5); }
  .btn-main:disabled { background: #E5E7EB; color: #9CA3AF; box-shadow: none; cursor: default; transform: none; }
  .btn-ghost {
    background: none; border: 2px solid #E5E7EB; border-radius: 50px;
    padding: 10px 24px; font-size: 14px; color: #6B7280;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: #9CA3AF; color: #374151; }

  .hint-box {
    border-radius: 10px; padding: 10px 14px;
    font-size: 13px; line-height: 1.7; margin-bottom: 14px;
  }
  .step-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg,#F59E0B,#EF8C00);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: white; flex-shrink: 0; font-size: 16px;
  }
  .q-circle {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .sentence-row {
    display: flex; gap: 10px; border-radius: 10px; padding: 10px 12px;
  }
  .sentence-tag {
    font-size: 11px; font-weight: 800; white-space: nowrap;
    background: rgba(255,255,255,0.8); padding: 1px 7px;
    border-radius: 8px; align-self: flex-start; margin-top: 2px;
  }

  /* AI correction */
  .btn-correct {
    width: 100%;
    background: linear-gradient(135deg, #6366F1, #4F46E5);
    color: white; border: none; border-radius: 16px; padding: 18px;
    font-size: 17px; font-weight: 800; cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(99,102,241,0.45);
    letter-spacing: 1px; transition: all 0.2s;
  }
  .btn-correct:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,0.55); }

  .loading-box {
    background: #EEF2FF; border-radius: 16px; padding: 28px;
    text-align: center; border: 1px solid #C7D2FE;
  }
  .loading-bar { height: 4px; background: #C7D2FE; border-radius: 4px; overflow: hidden; margin-top: 16px; }
  .loading-fill { height: 100%; width: 50%; background: #6366F1; border-radius: 4px; animation: slide 1.2s ease-in-out infinite; }

  .result-section {
    border-radius: 16px; padding: 18px; margin-bottom: 12px;
  }
  .result-label { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
  .result-text { font-size: 14px; color: #1C1917; line-height: 1.8; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .score-label { font-size: 13px; color: #374151; width: 64px; flex-shrink: 0; }
  .score-bar-bg { flex: 1; height: 8px; background: #F3F4F6; border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .score-emoji { font-size: 16px; }
  .score-comment { font-size: 12px; color: #6B7280; width: 56px; flex-shrink: 0; }

  .rewrite-box {
    font-size: 15px; color: #1C1917; line-height: 2;
    background: white; border-radius: 10px; padding: 12px 14px;
    border: 1px solid #E0E7FF;
  }

  .stat-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .stat-item {
    flex: 1; background: white; border-radius: 12px; padding: 12px;
    text-align: center; border: 1px solid #F3F4F6;
  }
  .stat-num { font-size: 24px; font-weight: 900; }
  .stat-lbl { font-size: 12px; color: #6B7280; }

  .burst-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .burst-star {
    position: absolute; animation: pop 0.8s ease-out both;
  }

  .nav-row { display: flex; gap: 8px; margin-top: 14px; }
  .err-box {
    background: #FFF1F2; border-radius: 14px; padding: 20px;
    text-align: center; border: 1px solid #FECDD3; margin-bottom: 12px;
  }
  .err-msg {
    font-size: 11px; color: #9CA3AF; margin: 8px 0 12px;
    text-align: left; background: #fff; border-radius: 8px;
    padding: 8px 10px; word-break: break-all;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">每日练习 · 第1步基本功</div>
  <div class="header-title">✍️ 句子扩写练习</div>
  <div class="header-desc">1句话 → 4句话，写完还能 AI 批改！</div>
</div>

<div class="progress-wrap">
  <div class="progress-dots" id="dots"></div>
  <div class="progress-label" id="stepLabel">选一个话题</div>
</div>

<div class="main" id="main"></div>

<div class="burst-container" id="burst" style="display:none;"></div>

<script>
const GEMINI_KEY = "AIzaSyAWJq6nyYSUQfKMsVV9uORvnn8y8E78zqo";

const TOPICS = [
  { label: "🏀 篮球场", sentence: "我喜欢篮球场。" },
  { label: "🌳 小树林", sentence: "我喜欢小树林。" },
  { label: "🐱 小猫咪", sentence: "我家有一只小猫。" },
  { label: "📚 书桌",   sentence: "我有一张书桌。" },
  { label: "🌻 奶奶家", sentence: "我喜欢去奶奶家。" },
  { label: "🛝 公园",   sentence: "我喜欢去公园玩。" },
  { label: "✏️ 自己写", sentence: "" },
];

const QUESTIONS = [
  { icon:"👁️", color:"#F59E0B", bg:"#FFFBEB", border:"#FDE68A",
    label:"第一问：样子", q:"它长什么样？有什么特别的地方？",
    hint:"比如颜色、形状、大小……闭上眼睛想一想，你看到了什么？",
    ph:"它是什么样子的……" },
  { icon:"🏃", color:"#10B981", bg:"#ECFDF5", border:"#A7F3D0",
    label:"第二问：行动", q:"在这里，你会做什么？或者它有什么用？",
    hint:"比如你的动作、你做了什么事……越具体越好！",
    ph:"我在这里会……" },
  { icon:"💭", color:"#6366F1", bg:"#EEF2FF", border:"#C7D2FE",
    label:"第三问：感受", q:"你心里有什么感受？",
    hint:"比如开心、兴奋、轻松……说说为什么有这种感觉。",
    ph:"每次来到这里，我感觉……" },
];

const STEP_LABELS = ["选一个话题","写出第一句","第一问：样子","第二问：行动","第三问：感受","完成啦！"];

let state = {
  phase: "pick",  // pick | base | q0 | q1 | q2 | result
  topicIdx: null,
  base: "",
  answers: ["","",""],
  qIdx: 0,
};

function stepNum() {
  if (state.phase === "pick")   return 0;
  if (state.phase === "base")   return 1;
  if (state.phase === "result") return 5;
  return 2 + state.qIdx;
}

function renderDots() {
  const n = 5, cur = stepNum();
  document.getElementById("dots").innerHTML = Array.from({length:n}).map((_,i)=>{
    let cls = "dot";
    if (i < cur) cls += " done";
    else if (i === cur) cls += " active";
    return `<div class="${cls}"></div>`;
  }).join("");
  document.getElementById("stepLabel").textContent = STEP_LABELS[cur] || "";
}

function render() {
  renderDots();
  const el = document.getElementById("main");
  if (state.phase === "pick")   el.innerHTML = renderPick();
  if (state.phase === "base")   el.innerHTML = renderBase();
  if (state.phase.startsWith("q")) el.innerHTML = renderQuestion();
  if (state.phase === "result") el.innerHTML = renderResult();
  attachEvents();
}

// ── PICK ──────────────────────────────────────────────────────────
function renderPick() {
  const btns = TOPICS.map((t,i) =>
    `<button class="topic-btn${i===TOPICS.length-1?" topic-full":""}" onclick="pickTopic(${i})">${t.label}</button>`
  ).join("");
  return `
    <div class="card">
      <div style="font-size:18px;font-weight:800;margin-bottom:6px;">今天想写什么？</div>
      <div style="font-size:14px;color:#6B7280;margin-bottom:20px;">选一个你熟悉的地方、物品或者小动物 👇</div>
      <div class="topic-grid">${btns}</div>
    </div>
    <div style="background:#FFF8E7;border:1px solid #FDE68A;border-radius:14px;padding:14px 16px;font-size:13px;color:#92400E;line-height:1.7;">
      💡 <strong>小提示：</strong>选一个你最熟悉的，写起来会更顺！
    </div>`;
}

// ── BASE ──────────────────────────────────────────────────────────
function renderBase() {
  const ref = state.topicIdx !== null && state.topicIdx < TOPICS.length-1
    ? `<div class="hint-box" style="background:#FFF8E7;border:1px solid #FDE68A;color:#92400E;">
        📌 参考开头：<strong>${TOPICS[state.topicIdx].sentence}</strong>（可以修改）
       </div>` : "";
  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div class="step-circle">1</div>
        <div>
          <div style="font-size:16px;font-weight:800;">先写一句话</div>
          <div style="font-size:13px;color:#6B7280;">用一句简单的话，说说你选的话题</div>
        </div>
      </div>
      ${ref}
      <textarea id="baseInput" rows="3" placeholder="在这里写你的第一句话……">${state.base}</textarea>
      <div style="text-align:center;margin-top:20px;">
        <button class="btn-main" id="baseNext">写好了，继续 →</button>
      </div>
    </div>
    <div style="text-align:center;">
      <button class="btn-ghost" onclick="reset()">← 重新选话题</button>
    </div>`;
}

// ── QUESTION ─────────────────────────────────────────────────────
function renderQuestion() {
  const qi = state.qIdx;
  const q = QUESTIONS[qi];
  const prev = state.answers.slice(0, qi).map((a,i) => `
    <div style="background:${QUESTIONS[i].bg};border:1px solid ${QUESTIONS[i].border};border-radius:14px;padding:10px 14px;margin-bottom:8px;">
      <div style="font-size:11px;color:${QUESTIONS[i].color};font-weight:700;margin-bottom:2px;">${QUESTIONS[i].icon} ${QUESTIONS[i].label}</div>
      <div style="font-size:14px;color:#374151;">${a}</div>
    </div>`).join("");
  return `
    <div style="background:white;border-radius:14px;padding:12px 16px;margin-bottom:12px;border:1px solid #F3F4F6;animation:fadeUp 0.4s ease both;">
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:4px;">你的第一句话：</div>
      <div style="font-size:15px;font-weight:600;color:#374151;">${state.base}</div>
    </div>
    ${prev}
    <div class="card" style="border:2px solid ${q.border};">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div class="q-circle" style="background:linear-gradient(135deg,${q.color},${q.color}bb);">${q.icon}</div>
        <div>
          <div style="font-size:12px;color:${q.color};font-weight:700;">${q.label}</div>
          <div style="font-size:17px;font-weight:800;">${q.q}</div>
        </div>
      </div>
      <div class="hint-box" style="background:${q.bg};border:1px solid ${q.border};color:#4B5563;">💡 ${q.hint}</div>
      <textarea id="ansInput" rows="4" placeholder="${q.ph}">${state.answers[qi]}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;">
        <button class="btn-ghost" id="qBack">← 上一步</button>
        <button class="btn-main" id="qNext">${qi < 2 ? "继续 →" : "🎉 完成！"}</button>
      </div>
    </div>
    <div style="text-align:center;font-size:13px;color:#9CA3AF;">还有 ${2-qi} 个问题就完成啦！</div>`;
}

// ── RESULT ────────────────────────────────────────────────────────
function renderResult() {
  const para = [state.base,...state.answers].filter(s=>s.trim()).join("");
  const colors = ["#6B7280",...QUESTIONS.map(q=>q.color)];
  const bgs = ["#F9FAFB",...QUESTIONS.map(q=>q.bg)];
  const labels = ["第1句","第2句","第3句","第4句"];
  const sentences = [state.base,...state.answers];
  const rows = sentences.map((s,i)=>`
    <div class="sentence-row" style="background:${bgs[i]};margin-bottom:8px;">
      <span class="sentence-tag" style="color:${colors[i]};">${labels[i]}</span>
      <span style="font-size:15px;color:#1C1917;line-height:1.8;">${s}</span>
    </div>`).join("");
  return `
    <div class="card" style="background:linear-gradient(135deg,#1C1917,#292524);text-align:center;">
      <div style="font-size:40px;margin-bottom:8px;">🌟</div>
      <div style="font-size:22px;font-weight:900;color:#FCD34D;margin-bottom:6px;">太棒了！写完了！</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.7);">你把1句话扩写成了4句话，厉害！</div>
    </div>
    <div class="card" style="border:2px solid #FDE68A;">
      <div style="font-size:13px;font-weight:700;color:#92400E;margin-bottom:14px;">📄 你写的段落：</div>
      ${rows}
      <div style="background:#FFFBEB;border-radius:12px;padding:16px;border:1px dashed #F59E0B;margin-bottom:12px;">
        <div style="font-size:11px;color:#92400E;font-weight:700;margin-bottom:6px;">✨ 合在一起就是一段话：</div>
        <div style="font-size:16px;color:#1C1917;line-height:2;" id="paraTxt">${para}</div>
      </div>
      <button onclick="copyPara()" id="copyBtn" style="width:100%;background:white;color:#374151;border:2px solid #E5E7EB;border-radius:12px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.3s;">📋 复制段落</button>
    </div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-num" style="color:#F59E0B;">${para.length}</div><div class="stat-lbl">字</div></div>
      <div class="stat-item"><div class="stat-num" style="color:#10B981;">4</div><div class="stat-lbl">句话</div></div>
      <div class="stat-item"><div class="stat-num" style="color:#6366F1;">✓</div><div class="stat-lbl">今日完成</div></div>
    </div>
    <div id="correctionArea">
      <button class="btn-correct" onclick="startCorrect()">🔍 点击批改，看看写得怎样！</button>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" style="flex:1;" onclick="rewrite()">🔄 重写</button>
      <button class="btn-main" style="flex:2;" onclick="reset()">换个话题再练 →</button>
    </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────
function attachEvents() {
  const baseInput = document.getElementById("baseInput");
  if (baseInput) {
    baseInput.addEventListener("input", e => state.base = e.target.value);
    document.getElementById("baseNext").addEventListener("click", () => {
      if (!state.base.trim()) return;
      state.phase = "q"; state.qIdx = 0;
      render();
    });
  }
  const ansInput = document.getElementById("ansInput");
  if (ansInput) {
    ansInput.focus();
    ansInput.addEventListener("input", e => state.answers[state.qIdx] = e.target.value);
    document.getElementById("qNext").addEventListener("click", () => {
      if (!state.answers[state.qIdx].trim()) return;
      if (state.qIdx < 2) { state.qIdx++; render(); }
      else { showBurst(); state.phase = "result"; render(); }
    });
    document.getElementById("qBack").addEventListener("click", () => {
      if (state.qIdx === 0) { state.phase = "base"; render(); }
      else { state.qIdx--; render(); }
    });
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────
function pickTopic(i) {
  state.topicIdx = i;
  state.base = i < TOPICS.length-1 ? TOPICS[i].sentence : "";
  state.phase = "base";
  render();
}
function reset() {
  state = { phase:"pick", topicIdx:null, base:"", answers:["","",""], qIdx:0 };
  render();
}
function rewrite() {
  state.answers = ["","",""]; state.qIdx = 0; state.phase = "base";
  render();
}
function copyPara() {
  const txt = document.getElementById("paraTxt").textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.textContent = "✅ 已复制！";
      btn.style.background = "#10B981";
      btn.style.color = "white";
      btn.style.borderColor = "#10B981";
      setTimeout(() => {
        btn.textContent = "📋 复制段落";
        btn.style.background = "white";
        btn.style.color = "#374151";
        btn.style.borderColor = "#E5E7EB";
      }, 2000);
    });
  }
}
function showBurst() {
  const c = document.getElementById("burst");
  c.style.display = "block";
  c.innerHTML = ["🌟","⭐","✨","🎉","🌟","✨","⭐","🎊","🌟","✨"].map((s,i) =>
    `<span class="burst-star" style="font-size:${20+Math.random()*24}px;left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation-delay:${i*0.08}s;">${s}</span>`
  ).join("");
  setTimeout(() => { c.style.display = "none"; c.innerHTML = ""; }, 1200);
}

// ── AI CORRECTION (Gemini) ────────────────────────────────────────
async function startCorrect() {
  const area = document.getElementById("correctionArea");
  area.innerHTML = `
    <div class="loading-box">
      <div style="font-size:32px;margin-bottom:10px;">📖</div>
      <div style="font-size:16px;font-weight:700;color:#4338CA;margin-bottom:6px;">老师正在认真批改中……</div>
      <div style="font-size:13px;color:#6366F1;">请稍等一下 🌟</div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>`;

  const prompt = `你是一位温柔耐心的小学语文老师，请批改以下四年级小朋友的句子扩写练习。
第1句：${state.base}
第2句：${state.answers[0]}
第3句：${state.answers[1]}
第4句：${state.answers[2]}

请只返回一个JSON对象，不要任何多余文字，格式如下：
{"star":"写得最好的一句话及原因（温柔鼓励，2句内）","scores":[{"label":"内容具体","score":4,"comment":"10字内评语"},{"label":"感官描写","score":3,"comment":"10字内评语"},{"label":"句子流畅","score":4,"comment":"10字内评语"}],"improve":"针对最需要改进的一处给具体建议（2句内）","rewrite":"把整段轻轻润色，保留儿童语气"}`;

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
        })
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error((data.error && data.error.message) || "HTTP " + res.status);
    const raw = data.candidates[0].content.parts[0].text.trim();
    const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
    if (s === -1) throw new Error("没有收到JSON：" + raw.slice(0,100));
    const r = JSON.parse(raw.slice(s, e+1));
    showCorrectionResult(r, area);
  } catch(err) {
    area.innerHTML = `
      <div class="err-box">
        <div style="font-size:14px;color:#BE123C;">😅 批改出了点问题</div>
        <div class="err-msg">${err.message}</div>
        <button onclick="startCorrect()" style="background:#BE123C;color:white;border:none;border-radius:20px;padding:8px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">重新批改</button>
      </div>`;
  }
}

function scoreColor(s) { return s >= 4 ? "#10B981" : s >= 3 ? "#F59E0B" : "#EF4444"; }
function scoreEmoji(s) { return s >= 5 ? "🌟" : s >= 4 ? "⭐" : s >= 3 ? "👍" : "💪"; }

function showCorrectionResult(r, area) {
  const scores = (r.scores || []).map(s => `
    <div class="score-row">
      <div class="score-label">${s.label}</div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${(s.score/5)*100}%;background:${scoreColor(s.score)};"></div></div>
      <div class="score-emoji">${scoreEmoji(s.score)}</div>
      <div class="score-comment">${s.comment}</div>
    </div>`).join("");

  area.innerHTML = `
    <div class="result-section" style="background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #FDE68A;">
      <div class="result-label" style="color:#92400E;">⭐ 写得最好的地方</div>
      <div class="result-text">${r.star}</div>
    </div>
    <div class="result-section" style="background:white;border:1px solid #F3F4F6;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
      <div class="result-label" style="color:#374151;">📊 本次评分</div>
      ${scores}
    </div>
    <div class="result-section" style="background:#F0FDF4;border:1px solid #BBF7D0;">
      <div class="result-label" style="color:#15803D;">💡 下次可以这样试试</div>
      <div class="result-text">${r.improve}</div>
    </div>
    <div class="result-section" style="background:#EEF2FF;border:1px solid #C7D2FE;">
      <div class="result-label" style="color:#4338CA;">✨ 老师帮你润色后是这样的</div>
      <div class="rewrite-box">${r.rewrite}</div>
      <div style="font-size:12px;color:#6366F1;margin-top:8px;">📌 这只是参考，你自己写的也很棒！</div>
    </div>
    <button onclick="startCorrect()" style="width:100%;background:none;border:2px solid #E5E7EB;border-radius:50px;padding:10px;font-size:13px;color:#6B7280;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:4px;">🔄 重新批改</button>`;
}

// ── INIT ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
